<template>
    <div class="slds-box slds-theme_default form-card-container">
        <lightning-card title="Add New Location" icon-name="standard:location">
            <div class="slds-p-around_medium">
                <lightning-record-edit-form object-api-name="Location__c" onsuccess={handleSuccess}>

                    <lightning-messages></lightning-messages>

                    <lightning-input-field field-name="Name"></lightning-input-field>
                    <lightning-input-field field-name="Pin_Code__c"></lightning-input-field>
                    <lightning-input-field field-name="Risk_Level__c" value="Green"></lightning-input-field>
                    <lightning-input-field field-name="Max_Capacity__c"></lightning-input-field>

                    <div class="slds-m-top_medium button-container">
                        <lightning-button variant="brand" type="submit" label="Save Location" stretch>
                        </lightning-button>
                    </div>
                </lightning-record-edit-form>
            </div>
        </lightning-card>
    </div>
</template>
